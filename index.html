<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Warden Waves</title>
<style>
body{margin:0;overflow:hidden;background:#111;color:white;font-family:Arial}
canvas{display:block;background:#252525}
#ui{position:fixed;top:10px;left:10px;font-size:18px;text-shadow:2px 2px #000;z-index:2}
.screen{position:fixed;inset:0;background:rgba(10,10,10,.92);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;z-index:5}
button{font-size:20px;padding:12px 18px;margin:8px;border:0;border-radius:12px;background:#f6a623;font-weight:bold}
.card{background:#222;border:2px solid #555;border-radius:14px;padding:14px;margin:8px;max-width:330px}
.hidden{display:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui"></div>

<div id="menu" class="screen">
<h1>Warden Waves</h1>
<p>Level 1: The Yard</p>
<p>Survive 10 waves. No health drops. Every hit matters.</p>
<p>Permanent Contraband: <span id="savedMoney">0</span></p>
<button onclick="startGame()">Start Run</button>
<button onclick="showCell()">Upgrade Cell</button>
</div>

<div id="choice" class="screen hidden">
<h1 id="choiceTitle">Wave Cleared</h1>
<p>Choose one Contraband Find:</p>
<div id="choiceList"></div>
</div>

<div id="cell" class="screen hidden">
<h1>Your Cell</h1>
<p>Permanent Contraband: <span id="cellMoney">0</span></p>
<div id="cellList"></div>
<button onclick="backToMenu()">Back</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const ui=document.getElementById("ui");
const menu=document.getElementById("menu");
const choice=document.getElementById("choice");
const cell=document.getElementById("cell");
const choiceList=document.getElementById("choiceList");
const cellList=document.getElementById("cellList");

function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize(); addEventListener("resize",resize);

let save=JSON.parse(localStorage.getItem("wardenSave")||'{"contraband":0,"bed":0,"workout":0,"shiv":0}');
function saveGame(){localStorage.setItem("wardenSave",JSON.stringify(save))}
function updateMenu(){document.getElementById("savedMoney").textContent=save.contraband}

let keys={},enemies=[],bullets=[],drops=[];
let running=false,wave=1,kills=0,neededKills=8,message="";

let player={
x:innerWidth/2,y:innerHeight/2,r:18,
hp:100,maxHp:100,speed:4,damage:12,
level:1,xp:0,contraband:0,attackTimer:0,attackSpeed:25
};

function applyPermanentStats(){
player.maxHp=100+save.bed*15;
player.hp=player.maxHp;
player.speed=4+save.workout*.35;
player.damage=12+save.shiv*4;
}

function startGame(){
menu.classList.add("hidden");
cell.classList.add("hidden");
choice.classList.add("hidden");
running=true;
wave=1;kills=0;
enemies=[];bullets=[];drops=[];
player.x=innerWidth/2;player.y=innerHeight/2;
player.level=1;player.xp=0;player.contraband=0;
player.attackSpeed=25;
applyPermanentStats();
spawnWave();
}

function spawnWave(){
neededKills=6+wave*3;
kills=0;
enemies=[];bullets=[];drops=[];
message="Wave "+wave+"/10";
for(let i=0;i<6;i++)spawnEnemy();
}

function spawnEnemy(){
let side=Math.floor(Math.random()*4),x,y;
if(side==0){x=-30;y=Math.random()*innerHeight}
if(side==1){x=innerWidth+30;y=Math.random()*innerHeight}
if(side==2){x=Math.random()*innerWidth;y=-30}
if(side==3){x=Math.random()*innerWidth;y=innerHeight+30}

let tough=Math.random()<wave*.08;
enemies.push({
x,y,
r:tough?24:15,
hp:tough?45+wave*12:18+wave*6,
speed:tough?1.15+wave*.05:1.6+wave*.08,
damage:tough?18:9,
color:tough?"#7b2cbf":"#3a86ff"
});
}

function update(){
if(!running)return;

while(enemies.length<6 && kills<neededKills)spawnEnemy();

let mx=0,my=0;
if(keys.w||keys.ArrowUp)my--;
if(keys.s||keys.ArrowDown)my++;
if(keys.a||keys.ArrowLeft)mx--;
if(keys.d||keys.ArrowRight)mx++;

let len=Math.hypot(mx,my);
if(len){mx/=len;my/=len}

player.x+=mx*player.speed;
player.y+=my*player.speed;
player.x=Math.max(player.r,Math.min(innerWidth-player.r,player.x));
player.y=Math.max(player.r,Math.min(innerHeight-player.r,player.y));

player.attackTimer--;
if(player.attackTimer<=0){shoot();player.attackTimer=player.attackSpeed}

for(let b of bullets){b.x+=b.vx;b.y+=b.vy;b.life--}
bullets=bullets.filter(b=>b.life>0);

for(let e of enemies){
let a=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(a)*e.speed;
e.y+=Math.sin(a)*e.speed;
if(dist(player,e)<player.r+e.r){
player.hp-=e.damage*.035;
if(player.hp<=0)gameOver(false);
}
}

for(let b of bullets){
for(let e of enemies){
if(!b.dead&&dist(b,e)<b.r+e.r){
e.hp-=b.damage;
b.dead=true;
}
}
}
bullets=bullets.filter(b=>!b.dead);

for(let i=enemies.length-1;i>=0;i--){
if(enemies[i].hp<=0){
drops.push({x:enemies[i].x,y:enemies[i].y,r:8});
enemies.splice(i,1);
kills++;
player.xp+=5;
if(player.xp>=player.level*20)levelUp();
}
}

for(let d of drops){
if(dist(player,d)<player.r+d.r+25){
player.contraband++;
d.dead=true;
}
}
drops=drops.filter(d=>!d.dead);

if(kills>=neededKills){
running=false;
if(wave>=10)gameOver(true);
else showWaveChoice();
}
}

function shoot(){
if(enemies.length==0)return;
let target=enemies[0],best=dist(player,target);
for(let e of enemies){
let d=dist(player,e);
if(d<best){best=d;target=e}
}
let a=Math.atan2(target.y-player.y,target.x-player.x);
bullets.push({
x:player.x,y:player.y,r:6,
vx:Math.cos(a)*8,vy:Math.sin(a)*8,
damage:player.damage,life:70
});
}

function levelUp(){
player.level++;
player.xp=0;
player.damage+=2;
player.maxHp+=5;
player.hp=Math.min(player.maxHp,player.hp+15);
message="Level Up!";
setTimeout(()=>message="Wave "+wave+"/10",1000);
}

const finds=[
{name:"Sharpened Toothbrush",text:"+4 damage",go:()=>player.damage+=4},
{name:"Stolen Boots",text:"+0.5 speed",go:()=>player.speed+=.5},
{name:"Prison Toughness",text:"+20 max HP, heal 20",go:()=>{player.maxHp+=20;player.hp=Math.min(player.maxHp,player.hp+20)}},
{name:"Quick Hands",text:"Attack faster",go:()=>player.attackSpeed=Math.max(12,player.attackSpeed-3)},
{name:"Lucky Dice",text:"+8 Contraband now",go:()=>player.contraband+=8},
{name:"Riot Padding",text:"Heal 35",go:()=>player.hp=Math.min(player.maxHp,player.hp+35)}
];

function showWaveChoice(){
choice.classList.remove("hidden");
document.getElementById("choiceTitle").textContent="Wave "+wave+" Cleared";
choiceList.innerHTML="";
let picks=[...finds].sort(()=>Math.random()-.5).slice(0,3);
for(let f of picks){
let div=document.createElement("div");
div.className="card";
div.innerHTML="<h2>"+f.name+"</h2><p>"+f.text+"</p>";
let btn=document.createElement("button");
btn.textContent="Choose";
btn.onclick=()=>{f.go(); choice.classList.add("hidden"); wave++; running=true; spawnWave();}
div.appendChild(btn);
choiceList.appendChild(div);
}
}

function gameOver(won){
running=false;
save.contraband+=player.contraband;
saveGame();
menu.classList.remove("hidden");
menu.innerHTML=`
<h1>${won?"You cleared Level 1!":"Back to the Cell"}</h1>
<p>Wave reached: ${wave>10?10:wave}/10</p>
<p>Contraband earned: ${player.contraband}</p>
<p>Total Contraband: ${save.contraband}</p>
<button onclick="location.reload()">Continue</button>`;
}

function showCell(){
menu.classList.add("hidden");
cell.classList.remove("hidden");
renderCell();
}

function renderCell(){
document.getElementById("cellMoney").textContent=save.contraband;
cellList.innerHTML="";
addUpgrade("Bed","Start with +15 HP per level","bed",20);
addUpgrade("Workout Corner","Move faster each level","workout",25);
addUpgrade("Shiv Bench","Start with +4 damage per level","shiv",30);
}

function addUpgrade(name,text,id,baseCost){
let lvl=save[id];
let cost=baseCost*(lvl+1);
let div=document.createElement("div");
div.className="card";
div.innerHTML="<h2>"+name+" Lv."+lvl+"</h2><p>"+text+"</p><p>Cost: "+cost+"</p>";
let btn=document.createElement("button");
btn.textContent="Upgrade";
btn.onclick=()=>{
if(save.contraband>=cost){
save.contraband-=cost;
save[id]++;
saveGame();
renderCell();
}
};
div.appendChild(btn);
cellList.appendChild(div);
}

function backToMenu(){location.reload()}

function draw(){
ctx.clearRect(0,0,innerWidth,innerHeight);
ctx.fillStyle="#262626";
ctx.fillRect(0,0,innerWidth,innerHeight);

ctx.strokeStyle="#444";
for(let x=0;x<innerWidth;x+=70){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,innerHeight);ctx.stroke()}
for(let y=0;y<innerHeight;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(innerWidth,y);ctx.stroke()}

ctx.fillStyle="#ff8c00"; circle(player.x,player.y,player.r);
for(let e of enemies){ctx.fillStyle=e.color;circle(e.x,e.y,e.r)}
for(let b of bullets){ctx.fillStyle="#ffd166";circle(b.x,b.y,b.r)}
for(let d of drops){ctx.fillStyle="#06d6a0";circle(d.x,d.y,d.r)}

ui.innerHTML=
`HP: ${Math.ceil(player.hp)} / ${player.maxHp}<br>
Wave: ${Math.min(wave,10)}/10<br>
Kills: ${kills}/${neededKills}<br>
Level: ${player.level}<br>
Run Contraband: ${player.contraband}<br>
${message}`;
}

function circle(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

canvas.addEventListener("touchmove",e=>{
e.preventDefault();
let t=e.touches[0];
player.x+=(t.clientX-player.x)*.08;
player.y+=(t.clientY-player.y)*.08;
},{passive:false});

function loop(){update();draw();requestAnimationFrame(loop)}
updateMenu();
loop();
</script>
</body>
</html>
