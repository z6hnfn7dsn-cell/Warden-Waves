<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warden Waves</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; font-family:Arial; color:white; }
    canvas { display:block; background:#222; }
    #ui { position:fixed; top:10px; left:10px; font-size:16px; }
    #menu { position:fixed; inset:0; background:#111; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
    button { font-size:22px; padding:14px 24px; margin:10px; border:0; border-radius:12px; background:#f6a623; font-weight:bold; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui"></div>

<div id="menu">
  <h1>Warden Waves</h1>
  <p>Survive the prison yard. Collect contraband. Escape the waves.</p>
  <button onclick="startGame()">Start Run</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const menu = document.getElementById("menu");

canvas.width = innerWidth;
canvas.height = innerHeight;

let keys = {};
let enemies = [];
let bullets = [];
let drops = [];
let running = false;

let player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  r: 18,
  hp: 100,
  maxHp: 100,
  speed: 4,
  damage: 12,
  xp: 0,
  level: 1,
  contraband: 0,
  attackTimer: 0
};

let wave = 1;
let kills = 0;
let neededKills = 8;

function startGame() {
  menu.style.display = "none";
  running = true;
  enemies = [];
  bullets = [];
  drops = [];
  wave = 1;
  kills = 0;
  neededKills = 8;
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.hp = player.maxHp;
  player.xp = 0;
  player.level = 1;
  player.contraband = 0;
  spawnWave();
}

function spawnWave() {
  neededKills = 6 + wave * 3;
  kills = 0;
  for (let i = 0; i < 5 + wave * 2; i++) spawnEnemy();
}

function spawnEnemy() {
  let side = Math.floor(Math.random() * 4);
  let x, y;

  if (side === 0) { x = -30; y = Math.random() * canvas.height; }
  if (side === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; }
  if (side === 2) { x = Math.random() * canvas.width; y = -30; }
  if (side === 3) { x = Math.random() * canvas.width; y = canvas.height + 30; }

  let strong = Math.random() < wave * 0.05;

  enemies.push({
    x, y,
    r: strong ? 24 : 16,
    hp: strong ? 50 + wave * 10 : 22 + wave * 5,
    speed: strong ? 1.2 : 1.8,
    damage: strong ? 18 : 10,
    color: strong ? "#7b2cbf" : "#3a86ff"
  });
}

function shoot() {
  if (enemies.length === 0) return;

  let nearest = enemies[0];
  let best = distance(player, nearest);

  for (let e of enemies) {
    let d = distance(player, e);
    if (d < best) {
      best = d;
      nearest = e;
    }
  }

  let angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);

  bullets.push({
    x: player.x,
    y: player.y,
    r: 6,
    vx: Math.cos(angle) * 8,
    vy: Math.sin(angle) * 8,
    damage: player.damage
  });
}

function update() {
  if (!running) return;

  if (keys["ArrowUp"] || keys["w"]) player.y -= player.speed;
  if (keys["ArrowDown"] || keys["s"]) player.y += player.speed;
  if (keys["ArrowLeft"] || keys["a"]) player.x -= player.speed;
  if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;

  player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
  player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

  player.attackTimer--;
  if (player.attackTimer <= 0) {
    shoot();
    player.attackTimer = 28;
  }

  for (let b of bullets) {
    b.x += b.vx;
    b.y += b.vy;
  }

  bullets = bullets.filter(b => b.x > -50 && b.x < canvas.width + 50 && b.y > -50 && b.y < canvas.height + 50);

  for (let e of enemies) {
    let angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed;
    e.y += Math.sin(angle) * e.speed;

    if (distance(player, e) < player.r + e.r) {
      player.hp -= e.damage * 0.03;
      if (player.hp <= 0) gameOver(false);
    }
  }

  for (let b of bullets) {
    for (let e of enemies) {
      if (distance(b, e) < b.r + e.r) {
        e.hp -= b.damage;
        b.dead = true;
      }
    }
  }

  bullets = bullets.filter(b => !b.dead);

  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].hp <= 0) {
      drops.push({ x: enemies[i].x, y: enemies[i].y, r: 8 });
      enemies.splice(i, 1);
      kills++;
      player.xp += 5;
      if (player.xp >= player.level * 20) levelUp();
    }
  }

  for (let d of drops) {
    if (distance(player, d) < player.r + d.r + 20) {
      player.contraband++;
      d.dead = true;
    }
  }

  drops = drops.filter(d => !d.dead);

  if (kills >= neededKills && enemies.length === 0) {
    wave++;
    if (wave > 10) gameOver(true);
    else spawnWave();
  }
}

function levelUp() {
  player.level++;
  player.xp = 0;
  player.damage += 4;
  player.maxHp += 10;
  player.hp = Math.min(player.maxHp, player.hp + 25);
}

function gameOver(won) {
  running = false;
  menu.style.display = "flex";
  menu.innerHTML = `
    <h1>${won ? "You Escaped!" : "Back to the Cell"}</h1>
    <p>Wave reached: ${wave}</p>
    <p>Contraband collected: ${player.contraband}</p>
    <button onclick="location.reload()">Play Again</button>
  `;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#2b2b2b";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#555";
  for (let x = 0; x < canvas.width; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  ctx.fillStyle = "#ff8c00";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fill();

  for (let e of enemies) {
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fill();
  }

  for (let b of bullets) {
    ctx.fillStyle = "#ffd166";
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }

  for (let d of drops) {
    ctx.fillStyle = "#06d6a0";
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }

  ui.innerHTML = `
    HP: ${Math.ceil(player.hp)} / ${player.maxHp}<br>
    Wave: ${wave}/10<br>
    Level: ${player.level}<br>
    Contraband: ${player.contraband}
  `;
}

function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  let t = e.touches[0];
  player.x += (t.clientX - player.x) * 0.08;
  player.y += (t.clientY - player.y) * 0.08;
}, { passive:false });

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
